<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>道路の凸凹を伝えるアプリ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #202427;
      --muted: #667077;
      --line: #d8e0e4;
      --panel: #ffffff;
      --bg: #eef3f5;
      --safe: #1d8f74;
      --safe-soft: #dff4ec;
      --warn: #e36b2c;
      --warn-soft: #fff0e8;
      --danger: #c83e46;
      --danger-soft: #ffe8ea;
      --blue: #2f6fc7;
      --blue-soft: #e8f0ff;
      --shadow: 0 16px 38px rgba(32, 36, 39, 0.13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(32, 36, 39, 0.04) 1px, transparent 1px),
        linear-gradient(rgba(32, 36, 39, 0.04) 1px, transparent 1px),
        var(--bg);
      background-size: 44px 44px;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 360px;
    }

    .sidebar, .details {
      padding: 18px;
      background: rgba(255, 255, 255, 0.9);
      border-right: 1px solid var(--line);
      overflow: auto;
    }

    .details {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.35;
    }

    .lead {
      margin: 8px 0 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .section {
      padding: 15px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px rgba(32, 36, 39, 0.06);
    }

    .mode-grid, .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode {
      min-height: 78px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #f8fafb;
      text-align: left;
      transition: border 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .mode strong, .mode span { display: block; }
    .mode strong { margin-bottom: 4px; font-size: 14px; }
    .mode span { color: var(--muted); font-size: 12px; line-height: 1.45; }

    .mode.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      transform: translateY(-1px);
    }

    label {
      display: grid;
      gap: 6px;
      margin: 10px 0;
      color: var(--muted);
      font-size: 13px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
    }

    textarea { min-height: 74px; resize: vertical; }

    .primary, .secondary {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 7px;
      font-weight: 700;
    }

    .primary {
      width: 100%;
      color: #fff;
      background: var(--blue);
      box-shadow: 0 8px 20px rgba(47, 111, 199, 0.22);
    }

    .secondary { color: var(--blue); background: var(--blue-soft); }

    .map-wrap {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background: #dce8ee;
    }

    .topbar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 1000;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      font-weight: 700;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
    }

    .map-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .map-tools {
      position: absolute;
      right: 16px;
      top: 92px;
      z-index: 1000;
      display: grid;
      gap: 8px;
      width: min(180px, calc(100% - 32px));
    }

    .map-tool {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(32, 36, 39, 0.12);
      font-weight: 800;
      text-align: left;
    }

    .map-tool:hover { background: #f5f9fb; }

    .legend {
      display: grid;
      gap: 7px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(32, 36, 39, 0.12);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .legend-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 2px #fff;
      flex: 0 0 auto;
    }

    .legend-dot.high { background: var(--danger); }
    .legend-dot.medium { background: var(--warn); }
    .legend-dot.low { background: var(--safe); }
    .legend-line {
      width: 22px;
      height: 4px;
      border-radius: 999px;
      background: #2378ff;
      flex: 0 0 auto;
    }

    .map {
      position: absolute;
      inset: 0;
      min-height: 100vh;
    }

    .leaflet-container {
      font-family: inherit;
      background: #dce8ee;
    }

    .hazard-marker {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50% 50% 50% 8px;
      transform: rotate(-45deg);
      color: #fff;
      font-weight: 900;
      border: 3px solid #fff;
      box-shadow: 0 10px 22px rgba(32, 36, 39, 0.24);
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .hazard-marker span { transform: rotate(45deg); }
    .hazard-marker:hover,
    .hazard-marker.selected { transform: rotate(-45deg) scale(1.08); }
    .hazard-marker.low { background: var(--safe); }
    .hazard-marker.medium { background: var(--warn); }
    .hazard-marker.high { background: var(--danger); }
    .hazard-marker.dimmed { opacity: 0.35; }

    .location-marker {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #2378ff;
      border: 4px solid #fff;
      box-shadow: 0 0 0 8px rgba(35, 120, 255, 0.22), 0 8px 18px rgba(35, 120, 255, 0.28);
    }

    .destination-marker {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 50% 50% 50% 8px;
      transform: rotate(-45deg);
      color: #fff;
      font-weight: 900;
      background: #5b4df5;
      border: 3px solid #fff;
      box-shadow: 0 10px 22px rgba(91, 77, 245, 0.26);
    }

    .destination-marker span { transform: rotate(45deg); }

    .route-point {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid var(--safe);
      box-shadow: 0 4px 12px rgba(29, 143, 116, 0.32);
    }

    .start { left: 12%; top: 72%; }
    .goal { left: 77%; top: 25%; }

    .alert {
      position: absolute;
      left: 50%;
      bottom: 24px;
      z-index: 1000;
      width: min(560px, calc(100% - 32px));
      transform: translateX(-50%);
      padding: 13px 16px;
      border-radius: 8px;
      color: #fff;
      background: #202427;
      box-shadow: var(--shadow);
      display: grid;
      gap: 4px;
    }

    .alert strong { font-size: 15px; }
    .alert span { font-size: 13px; color: rgba(255, 255, 255, 0.78); }
    .hidden { display: none; }

    .list { display: grid; gap: 9px; }

    .item {
      display: grid;
      gap: 6px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      text-align: left;
    }

    .item.selected { border-color: var(--blue); background: var(--blue-soft); }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.low { color: #11654f; background: var(--safe-soft); }
    .badge.medium { color: #9b4318; background: var(--warn-soft); }
    .badge.high { color: #8f2430; background: var(--danger-soft); }

    .item p, .summary p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .danger-preview {
      padding: 13px;
      border-radius: 8px;
      background: var(--warn-soft);
      border: 1px solid rgba(227, 107, 44, 0.28);
    }

    .guide-panel {
      display: grid;
      gap: 8px;
      padding: 13px;
      border-radius: 8px;
      background: #eef5ff;
      border: 1px solid rgba(35, 120, 255, 0.22);
    }

    .guide-panel strong { color: var(--ink); }
    .guide-panel ol { margin: 0; padding-left: 20px; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .guide-panel p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.55; }

    .map-note {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 1000;
      max-width: min(360px, calc(100% - 32px));
      padding: 10px 12px;
      border-radius: 8px;
      color: #44515a;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(32, 36, 39, 0.12);
      font-size: 12px;
      line-height: 1.55;
    }

    .device-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .device {
      min-height: 82px;
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 9px 6px;
      border-radius: 8px;
      background: #f7fafb;
      border: 1px solid var(--line);
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .device strong { display: block; color: var(--ink); font-size: 20px; }

    @media (max-width: 1040px) {
      .app { grid-template-columns: 300px 1fr; }
      .details { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
      .map-wrap { min-height: 720px; }
    }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .sidebar, .details { border: 0; }
      .map-wrap { min-height: 620px; order: -1; }
      .topbar { top: 10px; left: 10px; right: 10px; }
      .map-tools { top: auto; left: 10px; right: 10px; bottom: 74px; width: auto; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .legend { grid-column: 1 / -1; }
      .row, .mode-grid, .device-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <h1>道路の凸凹を伝えるアプリ</h1>
      <p class="lead">ベビーカーや車いすで移動する人が、道路の危険を共有して、危険の少ない道を選べるマップです。</p>

      <section class="section">
        <h2>使う人</h2>
        <div class="mode-grid" id="modeGrid">
          <button class="mode active" type="button" data-mode="wheelchair">
            <strong>車いす</strong>
            <span>段差・急な坂・狭い歩道を強く警告</span>
          </button>
          <button class="mode" type="button" data-mode="stroller">
            <strong>ベビーカー</strong>
            <span>凸凹・砂利・横断のしにくさを強く警告</span>
          </button>
        </div>
      </section>

      <section class="section">
        <h2>行き先を設定</h2>
        <label>行きたい場所
          <select id="destinationInput">
            <option value="takamatsu">高松駅</option>
            <option value="marugame">丸亀駅</option>
            <option value="sakaide">坂出駅</option>
            <option value="kanonji">観音寺駅</option>
            <option value="shido">志度駅</option>
            <option value="tonosho">土庄港</option>
          </select>
        </label>
        <button class="primary" type="button" id="guideButton">現在地からルート案内</button>
        <button class="secondary" type="button" id="googleMapsButton">Googleマップで開く</button>
      </section>

      <section class="section">
        <h2>危険を投稿</h2>
        <label>場所の名前<input id="placeInput" maxlength="24" value="駅前通りの歩道"></label>
        <div class="row">
          <label>種類
            <select id="typeInput">
              <option value="凸凹">凸凹</option>
              <option value="段差">段差</option>
              <option value="舗装はがれ">舗装はがれ</option>
              <option value="急な坂">急な坂</option>
              <option value="狭い道">狭い道</option>
            </select>
          </label>
          <label>危険度
            <select id="levelInput">
              <option value="medium">注意</option>
              <option value="high">危険</option>
              <option value="low">少し注意</option>
            </select>
          </label>
        </div>
        <label>メモ<textarea id="noteInput">タイルが浮いていて、前輪が引っかかりやすいです。</textarea></label>
        <button class="primary" type="button" id="addButton">この場所を共有</button>
      </section>

      <section class="section">
        <h2>知らせ方</h2>
        <div class="device-grid">
          <div class="device"><strong>スマホ</strong>通知で知らせる</div>
          <div class="device"><strong>時計</strong>振動で知らせる</div>
          <div class="device"><strong>音声</strong>イヤホンで案内</div>
        </div>
      </section>
    </aside>

    <section class="map-wrap" aria-label="危険共有マップ">
      <div class="topbar">
        <div class="status">
          <span class="pill" id="profilePill">車いす向け</span>
          <span id="routeStatus">危険の少ないルートを表示中</span>
          <span id="locationStatus" aria-live="polite">現在地は未表示</span>
        </div>
        <div class="map-actions">
          <button class="secondary" type="button" id="locationButton">現在地を表示</button>
          <button class="secondary" type="button" id="routeButton">安全ルートを再計算</button>
        </div>
      </div>

      <div class="map" id="map"></div>
      <div class="map-tools" aria-label="地図操作">
        <button class="map-tool" type="button" data-map-action="prefecture">香川県全体</button>
        <button class="map-tool" type="button" data-map-action="hazards">危険ピン</button>
        <button class="map-tool" type="button" data-map-action="destination">目的地</button>
        <button class="map-tool" type="button" data-map-action="current">現在地</button>
        <div class="legend" aria-label="凡例">
          <div class="legend-row"><span class="legend-dot high"></span><span>危険</span></div>
          <div class="legend-row"><span class="legend-dot medium"></span><span>注意</span></div>
          <div class="legend-row"><span class="legend-dot low"></span><span>少し注意</span></div>
          <div class="legend-row"><span class="legend-line"></span><span>案内ルート</span></div>
        </div>
      </div>
      <div class="map-note">香川県全体の地図を表示しています。ピンは試作品用のサンプル危険情報です。</div>

      <div class="alert hidden" id="alertBox">
        <strong id="alertTitle"></strong>
        <span id="alertText"></span>
      </div>
    </section>

    <aside class="details">
      <section class="section summary">
        <h2>ルート案内</h2>
        <div class="guide-panel" id="guidePreview">
          <p>行きたい場所を選んで、現在地からルート案内を始められます。</p>
        </div>
      </section>

      <section class="section summary">
        <h2>選択中の危険</h2>
        <div class="danger-preview" id="selectedPreview">
          <p>マップのピン、または下の一覧を選ぶと詳細が出ます。</p>
        </div>
      </section>

      <section class="section">
        <h2>共有された危険</h2>
        <div class="list" id="hazardList"></div>
      </section>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const defaultHazards = [
      { id: "h1", place: "高松駅前の歩道", type: "段差", level: "high", note: "駅前広場から横断歩道へ向かう部分に段差があります。", lat: 34.3506, lng: 134.0467, targets: ["wheelchair", "stroller"] },
      { id: "h2", place: "丸亀駅周辺", type: "凸凹", level: "medium", note: "歩道の一部に古い舗装の盛り上がりがあります。", lat: 34.2919, lng: 133.7931, targets: ["stroller"] },
      { id: "h3", place: "坂出駅前通り", type: "舗装はがれ", level: "medium", note: "雨の日は水たまりになり、穴が見えにくいです。", lat: 34.3129, lng: 133.8569, targets: ["wheelchair", "stroller"] },
      { id: "h4", place: "観音寺市中心部", type: "狭い道", level: "low", note: "時間帯によって人通りが多く、通りにくくなります。", lat: 34.1275, lng: 133.6614, targets: ["wheelchair"] },
      { id: "h5", place: "さぬき市志度駅付近", type: "急な坂", level: "medium", note: "駅から住宅地へ向かう道に傾斜があります。", lat: 34.3214, lng: 134.1735, targets: ["wheelchair"] },
      { id: "h6", place: "土庄港周辺", type: "段差", level: "medium", note: "港の近くに小さな段差が続く場所があります。", lat: 34.4862, lng: 134.1856, targets: ["wheelchair", "stroller"] }
    ];

    const labels = { wheelchair: "車いす", stroller: "ベビーカー", low: "少し注意", medium: "注意", high: "危険" };
    const symbols = { "凸凹": "凸", "段差": "段", "舗装はがれ": "割", "急な坂": "坂", "狭い道": "狭" };
    const destinations = {
      takamatsu: { name: "高松駅", lat: 34.3506, lng: 134.0467 },
      marugame: { name: "丸亀駅", lat: 34.2919, lng: 133.7931 },
      sakaide: { name: "坂出駅", lat: 34.3129, lng: 133.8569 },
      kanonji: { name: "観音寺駅", lat: 34.1236, lng: 133.6555 },
      shido: { name: "志度駅", lat: 34.3214, lng: 134.1735 },
      tonosho: { name: "土庄港", lat: 34.4862, lng: 134.1856 }
    };

    const modeGrid = document.querySelector("#modeGrid");
    const profilePill = document.querySelector("#profilePill");
    const map = document.querySelector("#map");
    const list = document.querySelector("#hazardList");
    const selectedPreview = document.querySelector("#selectedPreview");
    const guidePreview = document.querySelector("#guidePreview");
    const addButton = document.querySelector("#addButton");
    const destinationInput = document.querySelector("#destinationInput");
    const guideButton = document.querySelector("#guideButton");
    const googleMapsButton = document.querySelector("#googleMapsButton");
    const locationButton = document.querySelector("#locationButton");
    const locationStatus = document.querySelector("#locationStatus");
    const mapTools = document.querySelector(".map-tools");
    const routeButton = document.querySelector("#routeButton");
    const routeStatus = document.querySelector("#routeStatus");
    const alertBox = document.querySelector("#alertBox");
    const alertTitle = document.querySelector("#alertTitle");
    const alertText = document.querySelector("#alertText");
    const storageKey = "road-safety-hazards-kagawa-prefecture";
    const kagawaCenter = [34.275, 133.95];
    const kagawaBounds = [
      [34.02, 133.43],
      [34.58, 134.45]
    ];
    const sampleAreas = [
      [34.3506, 134.0467],
      [34.2919, 133.7931],
      [34.3129, 133.8569],
      [34.1275, 133.6614],
      [34.3214, 134.1735],
      [34.4862, 134.1856]
    ];
    const safeRoutePoints = [
      [34.3506, 134.0467],
      [34.3129, 133.8569],
      [34.2919, 133.7931],
      [34.1275, 133.6614]
    ];

    let mode = "wheelchair";
    let selectedId = null;
    let hazards = JSON.parse(localStorage.getItem(storageKey) || "null") || defaultHazards;
    let markers = [];
    let currentLatLng;
    let currentLocationMarker;
    let currentAccuracyCircle;
    let safeRouteLine;
    let guideRouteLine;
    let destinationMarker;
    let pendingGuide = false;
    const realMap = L.map(map, {
      zoomControl: true,
      scrollWheelZoom: true
    }).setView(kagawaCenter, 9);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(realMap);

    realMap.fitBounds(kagawaBounds, { padding: [18, 18] });

    drawSafeRoute();

    function saveHazards() {
      localStorage.setItem(storageKey, JSON.stringify(hazards));
    }

    function isRelevant(hazard) {
      return hazard.targets.includes(mode);
    }

    function render() {
      profilePill.textContent = `${labels[mode]}向け`;
      document.querySelectorAll(".mode").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
      renderPins();
      renderList();
      renderSelected();
    }

    function renderPins() {
      markers.forEach((marker) => marker.remove());
      markers = [];
      hazards.forEach((hazard) => {
        const marker = L.marker([hazard.lat, hazard.lng], {
          icon: L.divIcon({
            className: "",
            iconSize: [42, 42],
            iconAnchor: [21, 42],
            html: `<div class="hazard-marker ${hazard.level} ${isRelevant(hazard) ? "" : "dimmed"} ${selectedId === hazard.id ? "selected" : ""}"><span>${symbols[hazard.type] || "!"}</span></div>`
          })
        }).addTo(realMap);

        marker.bindTooltip(`${hazard.place} / ${hazard.type}`, { direction: "top", offset: [0, -34] });
        marker.on("click", () => selectHazard(hazard.id));
        markers.push(marker);
      });
    }

    function renderList() {
      list.innerHTML = "";
      hazards
        .slice()
        .sort((a, b) => Number(isRelevant(b)) - Number(isRelevant(a)))
        .forEach((hazard) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "item";
          item.classList.toggle("selected", selectedId === hazard.id);
          item.innerHTML = `
            <div class="item-head">
              <strong>${hazard.place}</strong>
              <span class="badge ${hazard.level}">${labels[hazard.level]}</span>
            </div>
            <p>${hazard.type} / ${hazard.note}</p>
            <p>対象: ${hazard.targets.map((target) => labels[target]).join("・")}</p>
          `;
          item.addEventListener("click", () => selectHazard(hazard.id));
          list.append(item);
        });
    }

    function renderSelected() {
      const hazard = hazards.find((item) => item.id === selectedId);
      if (!hazard) {
        selectedPreview.innerHTML = "<p>マップのピン、または下の一覧を選ぶと詳細が出ます。</p>";
        return;
      }
      const warning = isRelevant(hazard)
        ? `${labels[mode]}では特に注意が必要です。`
        : `${labels[mode]}では優先度は低めですが、通行時は確認してください。`;
      selectedPreview.innerHTML = `
        <div class="item-head">
          <strong>${hazard.place}</strong>
          <span class="badge ${hazard.level}">${labels[hazard.level]}</span>
        </div>
        <p>${hazard.type}: ${hazard.note}</p>
        <p>${warning}</p>
      `;
    }

    function selectHazard(id) {
      selectedId = id;
      const hazard = hazards.find((item) => item.id === id);
      render();
      if (hazard) {
        realMap.setView([hazard.lat, hazard.lng], Math.max(realMap.getZoom(), 12));
        showAlert(hazard);
      }
    }

    function showAlert(hazard) {
      alertTitle.textContent = `${hazard.place}に${hazard.type}`;
      alertText.textContent = isRelevant(hazard)
        ? `${labels[mode]}向けに${labels[hazard.level]}として通知します。`
        : "現在の使い方では低めに表示しています。";
      alertBox.classList.remove("hidden");
      window.clearTimeout(showAlert.timer);
      showAlert.timer = window.setTimeout(() => alertBox.classList.add("hidden"), 3600);
    }

    function addHazard() {
      const place = document.querySelector("#placeInput").value.trim() || "名前のない場所";
      const type = document.querySelector("#typeInput").value;
      const level = document.querySelector("#levelInput").value;
      const note = document.querySelector("#noteInput").value.trim() || "詳しいメモはまだありません。";
      const targets = type === "凸凹" || type === "舗装はがれ"
        ? ["wheelchair", "stroller"]
        : ["wheelchair"];
      const area = sampleAreas[Math.floor(Math.random() * sampleAreas.length)];
      const hazard = {
        id: `h${Date.now()}`,
        place,
        type,
        level,
        note,
        lat: area[0] + (Math.random() - 0.5) * 0.035,
        lng: area[1] + (Math.random() - 0.5) * 0.045,
        targets
      };
      hazards.unshift(hazard);
      selectedId = hazard.id;
      saveHazards();
      render();
      showAlert(hazard);
    }

    function recalcRoute() {
      const count = hazards.filter((hazard) => isRelevant(hazard) && hazard.level !== "low").length;
      routeStatus.textContent = `${count}件の危険を避けてルートを更新しました`;
      routeButton.textContent = "更新済み";
      drawSafeRoute();
      window.setTimeout(() => {
        routeButton.textContent = "安全ルートを再計算";
      }, 1600);
    }

    function isInKagawa(lat, lng) {
      return lat >= kagawaBounds[0][0] && lat <= kagawaBounds[1][0]
        && lng >= kagawaBounds[0][1] && lng <= kagawaBounds[1][1];
    }

    function focusCurrentLocation() {
      if (!currentLatLng) return;
      realMap.setView(currentLatLng, 15);
      locationStatus.textContent = isInKagawa(currentLatLng[0], currentLatLng[1])
        ? "現在地を表示中"
        : "現在地を表示中（香川県外）";
    }

    function showCurrentLocation() {
      if (!navigator.geolocation) {
        locationStatus.textContent = "この端末では現在地を取得できません";
        return;
      }

      locationButton.disabled = true;
      locationButton.textContent = "取得中";
      locationStatus.textContent = "現在地を確認中";

      navigator.geolocation.getCurrentPosition((position) => {
        const { latitude, longitude, accuracy } = position.coords;
        const latlng = [latitude, longitude];
        currentLatLng = latlng;

        if (currentLocationMarker) currentLocationMarker.remove();
        if (currentAccuracyCircle) currentAccuracyCircle.remove();

        currentAccuracyCircle = L.circle(latlng, {
          radius: accuracy || 40,
          color: "#2378ff",
          fillColor: "#2378ff",
          fillOpacity: 0.12,
          weight: 2
        }).addTo(realMap);

        currentLocationMarker = L.marker(latlng, {
          icon: L.divIcon({
            className: "",
            iconSize: [26, 26],
            iconAnchor: [13, 13],
            html: '<div class="location-marker" aria-label="現在地"></div>'
          })
        }).addTo(realMap);
        currentLocationMarker.bindTooltip("現在地", { direction: "top", offset: [0, -14] });

        focusCurrentLocation();
        locationButton.disabled = false;
        locationButton.textContent = "現在地を表示";
        if (pendingGuide) {
          pendingGuide = false;
          startRouteGuide();
        }
      }, (error) => {
        const messages = {
          1: "位置情報の許可が必要です",
          2: "現在地を取得できませんでした",
          3: "現在地の取得に時間がかかっています"
        };
        locationStatus.textContent = messages[error.code] || "現在地を取得できませんでした";
        locationButton.disabled = false;
        locationButton.textContent = "現在地を表示";
        pendingGuide = false;
      }, {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 30000
      });
    }

    function getDistanceKm(from, to) {
      const start = L.latLng(from[0], from[1]);
      const goal = L.latLng(to[0], to[1]);
      return start.distanceTo(goal) / 1000;
    }

    function buildGuideRoute(from, to) {
      const midLat = (from[0] + to[0]) / 2 + 0.018;
      const midLng = (from[1] + to[1]) / 2 - 0.012;
      return [from, [midLat, midLng], to];
    }

    function startRouteGuide() {
      const destination = destinations[destinationInput.value];
      if (!destination) return;

      if (!currentLatLng) {
        guidePreview.innerHTML = "<p>現在地を取得してから、選んだ目的地までのルートを表示します。</p>";
        locationStatus.textContent = "ルート案内のため現在地を確認中";
        pendingGuide = true;
        showCurrentLocation();
        return;
      }

      const destinationLatLng = [destination.lat, destination.lng];
      const guidePoints = buildGuideRoute(currentLatLng, destinationLatLng);

      if (guideRouteLine) guideRouteLine.remove();
      if (destinationMarker) destinationMarker.remove();

      guideRouteLine = L.polyline(guidePoints, {
        color: "#2378ff",
        weight: 8,
        opacity: 0.9,
        dashArray: "12 10",
        lineCap: "round",
        lineJoin: "round"
      }).addTo(realMap);

      destinationMarker = L.marker(destinationLatLng, {
        icon: L.divIcon({
          className: "",
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          html: '<div class="destination-marker"><span>着</span></div>'
        })
      }).addTo(realMap);
      destinationMarker.bindTooltip(destination.name, { direction: "top", offset: [0, -28] });

      const distance = getDistanceKm(currentLatLng, destinationLatLng);
      const dangerCount = hazards.filter((hazard) => isRelevant(hazard) && hazard.level !== "low").length;
      realMap.fitBounds([currentLatLng, destinationLatLng], { padding: [80, 80] });
      routeStatus.textContent = `${destination.name}までのルートを表示中`;
      guidePreview.innerHTML = `
        <strong>現在地から${destination.name}まで</strong>
        <p>直線距離の目安は約${distance.toFixed(1)}kmです。危険情報を確認しながら進めるルートを表示しています。</p>
        <ol>
          <li>青い線に沿って目的地方面へ進みます。</li>
          <li>近くの危険ピンを確認し、段差や凸凹を避けます。</li>
          <li>目的地の「着」マークを目指します。</li>
        </ol>
        <p>現在の設定では${dangerCount}件の注意地点を考慮しています。</p>
      `;
    }

    function openGoogleMapsRoute() {
      const destination = destinations[destinationInput.value];
      if (!destination) return;

      const params = new URLSearchParams({
        api: "1",
        destination: `${destination.lat},${destination.lng}`,
        travelmode: "walking",
        dir_action: "navigate"
      });

      if (currentLatLng) {
        params.set("origin", `${currentLatLng[0]},${currentLatLng[1]}`);
      }

      window.open(`https://www.google.com/maps/dir/?${params.toString()}`, "_blank", "noopener");
      routeStatus.textContent = `${destination.name}をGoogleマップで開きます`;
    }

    function focusDestination() {
      const destination = destinations[destinationInput.value];
      if (!destination) return;
      const destinationLatLng = [destination.lat, destination.lng];

      if (destinationMarker) destinationMarker.remove();
      destinationMarker = L.marker(destinationLatLng, {
        icon: L.divIcon({
          className: "",
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          html: '<div class="destination-marker"><span>着</span></div>'
        })
      }).addTo(realMap);
      destinationMarker.bindTooltip(destination.name, { direction: "top", offset: [0, -28] });

      realMap.setView(destinationLatLng, 12);
      routeStatus.textContent = `${destination.name}を表示中`;
    }

    function focusHazards() {
      const relevantHazards = hazards.filter((hazard) => isRelevant(hazard));
      const points = relevantHazards.length ? relevantHazards : hazards;
      realMap.fitBounds(points.map((hazard) => [hazard.lat, hazard.lng]), { padding: [70, 70] });
      routeStatus.textContent = `${points.length}件の危険ピンを表示中`;
    }

    function handleMapTool(action) {
      if (action === "prefecture") {
        realMap.fitBounds(kagawaBounds, { padding: [18, 18] });
        routeStatus.textContent = "香川県全体を表示中";
        return;
      }

      if (action === "hazards") {
        focusHazards();
        return;
      }

      if (action === "destination") {
        focusDestination();
        return;
      }

      if (action === "current") {
        if (currentLatLng) {
          focusCurrentLocation();
        } else {
          showCurrentLocation();
        }
      }
    }

    function drawSafeRoute() {
      if (safeRouteLine) safeRouteLine.remove();
      safeRouteLine = L.polyline(safeRoutePoints, {
        color: "#1d8f74",
        weight: 7,
        opacity: 0.86,
        lineCap: "round",
        lineJoin: "round"
      }).addTo(realMap);
    }

    modeGrid.addEventListener("click", (event) => {
      const button = event.target.closest(".mode");
      if (!button) return;
      mode = button.dataset.mode;
      render();
      recalcRoute();
    });

    addButton.addEventListener("click", addHazard);
    destinationInput.addEventListener("change", focusDestination);
    guideButton.addEventListener("click", startRouteGuide);
    googleMapsButton.addEventListener("click", openGoogleMapsRoute);
    locationButton.addEventListener("click", showCurrentLocation);
    routeButton.addEventListener("click", recalcRoute);
    mapTools.addEventListener("click", (event) => {
      const button = event.target.closest("[data-map-action]");
      if (!button) return;
      handleMapTool(button.dataset.mapAction);
    });

    render();
  </script>
</body>
</html>
